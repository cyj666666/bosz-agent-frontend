<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贷后管理报告</title>
  <style>
    :root{
      --bg:#f4f8ff;
      --panel:rgba(255,255,255,.94);
      --line:rgba(31,90,181,.14);
      --text:#10233f;
      --muted:#5d7396;
      --accent:#1664ff;
      --shadow:0 20px 56px rgba(35,88,176,.12);
      --radius:24px;
      --red:#b1342c;
      --orange:#d7872d;
      --yellow:#d6a11f;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:"PingFang SC","Hiragino Sans GB","Noto Sans SC","Microsoft YaHei",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(84,160,255,.18), transparent 26%),
        radial-gradient(circle at 85% 18%, rgba(0,201,255,.12), transparent 18%),
        radial-gradient(circle at 80% 80%, rgba(22,100,255,.08), transparent 20%),
        linear-gradient(180deg,#fdfefe 0%,#f3f8ff 58%,#eef5ff 100%);
      min-height:100vh;
    }
    button,input,textarea{font:inherit}
    .report-shell{
      display:grid;
      grid-template-columns:260px minmax(0,1fr) 390px;
      gap:18px;
      align-items:start;
      padding:28px;
    }
    .panel{
      border-radius:var(--radius);
      border:1px solid var(--line);
      background:var(--panel);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
    }
    .report-nav,.side-panel{
      position:sticky;
      top:24px;
      max-height:calc(100vh - 48px);
      overflow:auto;
      padding:22px;
    }
    .report-main{min-width:0}
    .report-topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      margin-bottom:18px;
      padding:22px 24px;
    }
    .report-topbar-copy{display:grid;gap:8px;min-width:0}
    .report-company-title{
      margin:0;
      font-size:clamp(1.45rem,2.6vw,2.35rem);
      line-height:1.12;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .report-page-subtitle{
      margin:0;
      color:var(--muted);
      font-size:1.05rem;
      letter-spacing:.18em;
    }
    .toolbar{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .report-topbar .toolbar{max-width:560px;flex:0 0 auto}
    .primary-btn,.ghost-btn,.icon-btn,.context-menu button,.fake-chip{
      border:0;
      border-radius:14px;
      padding:11px 15px;
      cursor:pointer;
      transition:transform .18s ease, background .18s ease, box-shadow .18s ease;
    }
    .primary-btn{
      color:#fff;
      background:var(--accent);
      box-shadow:0 10px 24px rgba(22,100,255,.24);
    }
    .ghost-btn,.icon-btn,.context-menu button,.fake-chip{
      color:var(--text);
      background:#fff;
      border:1px solid var(--line);
    }
    .primary-btn:hover,.ghost-btn:hover,.icon-btn:hover,.context-menu button:hover,.fake-chip:hover{
      transform:translateY(-1px);
    }
    .report-topbar .ghost-btn,.report-topbar .primary-btn{
      min-width:96px;
      max-width:120px;
      min-height:52px;
      padding:10px 14px;
      line-height:1.35;
      text-align:center;
      white-space:normal;
    }
    .panel-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:12px;
    }
    .panel-head h2{margin:0;font-size:1.2rem}
    .sticky-head{
      position:sticky;
      top:0;
      z-index:3;
      background:inherit;
      padding-bottom:12px;
    }
    .filter-box{margin-top:10px;color:var(--muted);font-size:14px}
    .chapter-nav{display:flex;flex-direction:column;gap:8px;margin-top:14px}
    .nav-item{
      display:block;
      padding:12px 10px;
      border-radius:16px;
      text-decoration:none;
      color:inherit;
    }
    .nav-item:hover,.nav-item.active{background:rgba(227,239,255,.72)}
    .nav-item strong{display:block;line-height:1.45}
    .nav-item span{display:block;margin-top:4px;font-size:12px;color:var(--muted)}
    .report-sections{display:grid;gap:18px}
    .section-card{
      position:relative;
      padding:24px;
      border-radius:28px;
      background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(247,251,255,.94));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      overflow:hidden;
      scroll-margin-top:24px;
    }
    .section-card::before{
      content:"";
      position:absolute;
      inset:0 auto auto 0;
      width:100%;
      height:1px;
      background:linear-gradient(90deg,rgba(22,100,255,.52),transparent 68%);
    }
    .section-card h3{margin:0 0 12px;font-size:1.38rem}
    .section-card h4{margin:18px 0 8px;font-size:1.05rem}
    .section-body{color:var(--text);line-height:1.82}
    .section-body p{margin:10px 0}
    .empty-state,.muted{color:var(--muted)}
    .section-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:16px;
      padding-top:14px;
      border-top:1px dashed rgba(67,97,238,.20);
    }
    .table-wrap{
      overflow:auto;
      margin:12px 0 18px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.76);
    }
    table{width:100%;min-width:760px;border-collapse:collapse}
    th,td{
      text-align:left;
      vertical-align:top;
      padding:12px 11px;
      border-bottom:1px solid var(--line);
      word-break:break-word;
    }
    th{
      font-size:13px;
      color:var(--muted);
      background:rgba(237,244,255,.92);
      font-weight:700;
    }
    tr:last-child td{border-bottom:0}
    .kv-compact table{min-width:0}
    .kv-compact td{padding:8px 10px;line-height:1.55}
    .kv-key{
      width:170px;
      color:var(--muted);
      background:rgba(237,244,255,.68);
      font-weight:700;
      white-space:nowrap;
    }
    .risk-pill{
      display:inline-block;
      min-width:44px;
      padding:6px 10px;
      border-radius:999px;
      color:#fff;
      font-size:12px;
      text-align:center;
      font-weight:700;
    }
    .risk-red{background:var(--red)}
    .risk-orange{background:var(--orange)}
    .risk-yellow{background:var(--yellow)}
    .overview-box,.insight-box{
      padding:16px 18px;
      border:1px solid rgba(22,100,255,.14);
      border-radius:18px;
      background:linear-gradient(180deg,rgba(245,249,255,.96),rgba(255,255,255,.96));
      margin-bottom:12px;
    }
    .side-panel{
      transition:transform .28s ease, opacity .28s ease, box-shadow .28s ease;
      border:1px solid rgba(106,90,249,.24);
      background:
        linear-gradient(180deg,rgba(255,255,255,.96),rgba(244,248,255,.94)),
        linear-gradient(135deg,rgba(68,117,255,.08),rgba(131,88,255,.08));
      box-shadow:0 26px 72px rgba(18,42,86,.18), inset 0 0 0 1px rgba(118,129,255,.06);
    }
    .side-panel.collapsed{
      transform:translateX(calc(100% + 28px));
      opacity:0;
      pointer-events:none;
    }
    .side-panel.expanded{
      position:fixed;
      inset:16px 16px 16px 278px;
      width:auto;
      max-height:calc(100vh - 32px);
      z-index:32;
      box-shadow:0 32px 80px rgba(13,31,62,.24);
    }
    .side-panel-content{display:grid;gap:14px}
    .source-block{
      padding:16px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(248,251,255,.95);
    }
    .source-block h4{margin:0 0 8px}
    .source-block p{margin:8px 0;line-height:1.78}
    .fake-check-wrap{display:flex;flex-wrap:wrap;gap:10px;margin:8px 0 14px}
    .fake-chip{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      user-select:none;
      cursor:default;
    }
    .fake-chip input{accent-color:var(--accent);pointer-events:none}
    .side-panel-launcher,.back-to-top{
      position:fixed;
      right:18px;
      width:48px;
      height:48px;
      border:1px solid rgba(22,100,255,.26);
      border-radius:50%;
      background:linear-gradient(135deg,#edf4ff,#e9e3ff);
      color:var(--accent);
      font-size:1.2rem;
      font-weight:800;
      box-shadow:0 16px 40px rgba(22,100,255,.16);
      cursor:pointer;
      z-index:31;
    }
    .side-panel-launcher{top:50%;transform:translateY(-50%)}
    .back-to-top{bottom:22px;font-size:1.35rem}
    .panel-backdrop{
      position:fixed;
      inset:0;
      background:rgba(6,12,25,.28);
      backdrop-filter:blur(3px);
      z-index:30;
    }
    .hidden{display:none!important}
    .context-menu{
      position:fixed;
      z-index:40;
      display:grid;
      gap:6px;
      padding:8px;
      border-radius:18px;
      border:1px solid var(--line);
      background:var(--panel);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
    }
    .context-menu button{text-align:left;border-radius:12px;padding:10px 13px}
    .editable-block{
      outline:2px solid rgba(22,100,255,.28);
      border-radius:8px;
      background:rgba(220,232,255,.35);
    }
    .manual-card{
      padding:14px;
      border:1px dashed rgba(22,100,255,.35);
      border-radius:16px;
      background:rgba(245,250,255,.94);
      margin-top:12px;
    }
    .manual-card textarea{
      width:100%;
      min-height:96px;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      resize:vertical;
    }
    details.right-accordion{
      border:1px solid rgba(22,100,255,.14);
      border-radius:18px;
      background:rgba(248,251,255,.96);
      overflow:hidden;
      margin-bottom:10px;
    }
    details.right-accordion summary{
      cursor:pointer;
      padding:14px 16px;
      font-weight:700;
      list-style:none;
    }
    details.right-accordion summary::-webkit-details-marker{display:none}
    details.right-accordion[open] summary{
      border-bottom:1px solid rgba(22,100,255,.12);
      background:rgba(227,239,255,.48);
    }
    .right-accordion-body{padding:14px 16px 16px;line-height:1.75}
    @media (max-width:1180px){
      .report-shell{grid-template-columns:1fr}
      .report-nav,.side-panel{position:relative;top:0;max-height:none}
      .side-panel.collapsed{transform:none;opacity:1;pointer-events:auto}
      .side-panel.expanded{position:relative;inset:auto;max-height:none}
      .side-panel-launcher{display:none}
    }
    @media (max-width:860px){
      .report-shell{padding:16px}
      .report-topbar,.panel-head{flex-direction:column;align-items:stretch}
      .report-topbar .toolbar{justify-content:flex-start}
      .report-company-title{white-space:normal}
      .kv-key{width:120px}
    }
    @media print{
      body{background:#fff}
      .report-shell{display:block;padding:0}
      .report-nav,.side-panel,.side-panel-launcher,.back-to-top,.toolbar,
      .section-actions,.context-menu,.panel-backdrop{display:none!important}
      .report-topbar,.section-card{box-shadow:none;border:0;border-radius:0}
      .table-wrap{overflow:visible}
      table{min-width:0}
    }
  </style>
</head>
<body>
  <div class="report-shell">
    <aside class="report-nav panel">
      <div class="panel-head sticky-head">
        <h2>报告目录</h2>
      </div>
      <div class="filter-box">
        <label><input id="toggle-dynamic-only" type="checkbox" /> 只看有动态模块</label>
      </div>
      <nav id="chapter-nav" class="chapter-nav"></nav>
    </aside>

    <main class="report-main">
      <header class="report-topbar panel">
        <div class="report-topbar-copy">
          <h1 id="report-company-title" class="report-company-title">江苏xx制造有限公司</h1>
          <p class="report-page-subtitle">贷后管理报告</p>
        </div>
        <div class="toolbar">
          <button id="download-word" class="ghost-btn" type="button">深度分析</button>
          <button id="show-management-panel" class="ghost-btn" type="button">回溯管理<br>要求</button>
          <button id="show-customer-background-panel" class="ghost-btn" type="button">客户背景</button>
          <button id="download-report-word" class="primary-btn" type="button">下载 Word</button>
        </div>
      </header>

      <section id="report-sections" class="report-sections"></section>
    </main>

    <aside id="side-panel" class="side-panel panel collapsed">
      <div class="panel-head sticky-head">
        <h2 id="side-panel-title">侧边栏</h2>
        <div class="toolbar">
          <button id="toggle-panel-size" class="icon-btn" type="button" title="全屏/还原">⤢</button>
          <button id="toggle-panel-collapse" class="icon-btn" type="button" title="收起">×</button>
        </div>
      </div>
      <div id="side-panel-content" class="side-panel-content">
        <p class="empty-state">可通过顶部按钮查看客户背景 / 回溯管理要求，或在正文模块上右键查看溯源信息。</p>
      </div>
    </aside>

    <button id="side-panel-launcher" class="side-panel-launcher" type="button" title="打开右侧栏">◧</button>
    <button id="back-to-top" class="back-to-top" type="button" title="回到顶部">↑</button>
  </div>

  <div id="panel-backdrop" class="panel-backdrop hidden"></div>

  <div id="context-menu" class="context-menu hidden">
    <button data-action="provenance" type="button">查看溯源信息</button>
    <button data-action="insert-manual-note" type="button">人工填写</button>
    <button data-action="edit-current-block" type="button">修改当前文段</button>
  </div>

  <script>
    const REPORT = {
      companyName: "江苏xx制造有限公司",
      subtitle: "贷后管理报告"
    };

    const knowledgeUnitRows = [
      {"项目":"知识单元","内容":"受托支付资金归集（规则编号：T-FUND-003）"},
      {"项目":"适用场景","内容":"流动资金贷款受托支付、固定资产贷款受托支付"},
      {"项目":"触发条件","内容":"受托对手收款后 30 日内，划出金额 ≥受托金额 60%，且划出笔数 ≥3 笔"},
      {"项目":"扩展特征","内容":"收款方与划出收款方存在工商关联（共同法人/股东）；合同发票金额与受托金额不匹配"},
      {"项目":"置信度判断","内容":"流水数据直接命中 = 高；工商比对交叉验证 = 中高；合同发票核查 = 中高；综合得出 高"},
      {"项目":"风险传导路径","内容":"借款人 → 受托支付 → 钢材贸易公司 → 供应链公司 → 实控人关联方（资金灭失）"},
      {"项目":"处置模式","内容":"智能体自动推送 + 客户经理实地核实 + 风控岗复核 + 必要时法务介入"},
      {"项目":"关联知识","内容":"T-FUND-001（信贷资金回流）、T-FUND-002（资金用途异常）、T-CORP-007（隐性关联方识别）"}
    ];

    const riskInsightBaseRows = [
      {"项目":"预警编号","内容":"ALERT-2024-0403-001"},
      {"项目":"预警等级","内容":"红色（高风险）"},
      {"项目":"风险类型","内容":"交易行为风险 > 信贷资金流向异常 > 受托支付资金归集"},
      {"项目":"触发规则","内容":"受托支付资金归集（命中规则 T-FUND-003）"},
      {"项目":"信号摘要","内容":"受托支付款 800 万中 712 万（89%）于 4 日内划转至关联方，贸易背景存疑，资金疑似流入实控人控制的他公司"},
      {"项目":"关联客户","内容":"借款企业（苏州某精密机械制造公司）、上海某钢铁贸易公司（受托对手）、江苏某供应链公司（资金流向关联方）"},
      {"项目":"置信度","内容":"高（流水数据 + 工商穿透 + 合同发票比对）"},
      {"项目":"处置建议","内容":"① 立即推送客户经理，要求实地核实贸易背景 ② 核查发票真伪及合同实际执行情况 ③ 评估是否触发贷款提前到期条款 ④ 将关联方信息录入关联关系图谱"},
      {"项目":"推送对象","内容":"客户经理 / 贷后管理岗 / 风控主管"},
      {"项目":"处置期限","内容":"3 个工作日内反馈实地核查结果"},
      {"项目":"后续跟踪","内容":"如核实确认违规，提请法务介入，评估是否启动诉讼或担保品处置"}
    ];

    const riskInsightReasonRows = [
      {"推理节点":"节点 1：受托支付资金归集","判断依据":"收款方（上海钢铁贸易公司）于收受托款后第 3 天起，分多笔划出，4 日内累计划出 712 万（占受托金额 89%），账户基本清零。划转收款方“江苏某供应链公司”与上海钢铁贸易公司存在共同法定代表人。","置信度":"高（流水数据直接证据）","风险等级":"高风险","结论":"资金链疑似闭环回流至关联方"},
      {"推理节点":"节点 2：交易真实性存疑","判断依据":"上海钢铁贸易公司主营钢材批发，但“江苏某供应链公司”工商经营范围不含钢材销售。采购合同金额 800 万，对应发票仅 520 万，发票金额与划出金额不匹配。","置信度":"中高（工商+合同比对）","风险等级":"高风险","结论":"贸易背景存疑，涉嫌发票虚开"},
      {"推理节点":"节点 3：隐性关联方占用","判断依据":"“江苏某供应链公司”法人兼持股 60% 的股东，与借款人实控人存在历史关联（10 年前共同持股）。712 万最终流入借款人实控人控制的另一家公司（常熟某机械厂）。","置信度":"高（工商穿透+资金流追踪）","风险等级":"高风险","结论":"贷款资金被关联方占用，涉嫌骗贷"},
      {"推理节点":"节点 4：综合风险定级","判断依据":"三点叠加：受托支付资金归集 + 贸易背景不实 + 关联方占用 = 复合型违规。综合置信度高，触发红色预警。","置信度":"高","风险等级":"红色预警","结论":"建议立即启动提前到期或压降程序"}
    ];

    const riskInsightTriggerRows = [
      {"项目":"触发时间","内容":"2024 年 4 月 3 日（受托支付放款后第 19 天）"},
      {"项目":"触发规则","内容":"受托支付资金划转后 30 天内，收款方账户资金高频划转至同一第三方。阈值：划出笔数 ≥3 笔 / 累计金额 ≥受托金额 60%"},
      {"项目":"实际命中","内容":"上海某钢铁贸易公司收款后 4 日内，分 4 笔（共 712 万元）划转至“江苏某供应链公司”（收款方关联方）"}
    ];

    const basicInfoRows = [
      {"项目":"企业名称","内容":"江苏xx制造有限公司"},
      {"项目":"统一社会信用代码","内容":"9132XXXXXXXXXXXXXX"},
      {"项目":"注册资本","内容":"20,000万元"},
      {"项目":"成立日期","内容":"2016年5月18日"},
      {"项目":"实缴资本","内容":"15,000万元"},
      {"项目":"所属行业","内容":"专用设备制造业"},
      {"项目":"曾用名","内容":"/"},
      {"项目":"登记状态","内容":"存续"},
      {"项目":"注册地址","内容":"泰兴经济开发区澄江西一路29号"},
      {"项目":"控股类型","内容":"民营控股"},
      {"项目":"主营业务","内容":"智能自动化生产设备、精密检测设备及工业机器人系统集成产品的研发、生产和销售，主要服务于汽车零部件、消费电子、新能源电池及高端装备制造等行业客户"},
      {"项目":"股东","内容":"XX控股集团有限公司（65%）；张某某（20%）；苏州XXXX投资合伙企业（有限合伙）（15%）"},

    function escapeHtml(value){
      return String(value ?? "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function riskPill(value){
      const v = String(value || "");
      if(v.includes("红")) return `<span class="risk-pill risk-red">${escapeHtml(v)}</span>`;
      if(v.includes("橙")) return `<span class="risk-pill risk-orange">${escapeHtml(v)}</span>`;
      if(v.includes("黄")) return `<span class="risk-pill risk-yellow">${escapeHtml(v)}</span>`;
      return escapeHtml(v);
    }

    function tableHTML(rows, className="", options={}){
      const list = Array.isArray(rows) ? rows : [];
      if(!list.length) return '<p class="empty-state">暂无表格数据。</p>';

      const headers = [];
      const seen = new Set();
      list.forEach(row => Object.keys(row).forEach(key => {
        if(!seen.has(key)){
          seen.add(key);
          headers.push(key);
        }
      }));

      return `
        <div class="table-wrap ${className}">
          <table>
            ${options.noHead ? "" : `<thead><tr>${headers.map(h => `<th>${escapeHtml(h)}</th>`).join("")}</tr></thead>`}
            <tbody>
              ${list.map(row => `
                <tr>
                  ${headers.map(h => {
                    const raw = row[h] == null || row[h] === "" ? "—" : row[h];
                    if(options.riskColumn && h === options.riskColumn) return `<td>${riskPill(raw)}</td>`;
                    return `<td>${escapeHtml(raw)}</td>`;
                  }).join("")}
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function kvTableHTML(rows){
      return `
        <div class="table-wrap kv-compact">
          <table style="min-width:0;">
            <tbody>
              ${rows.map(row => `
                <tr>
                  <td class="kv-key">${escapeHtml(row.项目 || "")}</td>
                  <td>${escapeHtml(row.内容 || "—")}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;
    }

    function basicInfoGridHTML(rows){
      const list = Array.isArray(rows) ? rows : [];
      const longKeys = new Set(["主营业务","股东","注册地址","基本开户行","主要结算行","产业链","市场地位","商业模式","盈利模式","用信余额（当前）","用信余额（上次贷后）"]);
      const htmlParts = [];
      let buffer = [];

      const pushPairRow = items => {
        htmlParts.push(`
          <tr>
            <td class="kv-key">${escapeHtml(items[0].项目)}</td>
            <td>${escapeHtml(items[0].内容)}</td>
            <td class="kv-key">${escapeHtml(items[1].项目)}</td>
            <td>${escapeHtml(items[1].内容)}</td>
          </tr>
        `);
      };

      const flushBuffer = () => {
        if(buffer.length === 2){
          pushPairRow(buffer);
        }else if(buffer.length === 1){
          htmlParts.push(`
            <tr>
              <td class="kv-key">${escapeHtml(buffer[0].项目)}</td>
              <td colspan="3">${escapeHtml(buffer[0].内容)}</td>
            </tr>
          `);
        }
        buffer = [];
      };

      list.forEach(item => {
        if(longKeys.has(item.项目) || String(item.内容 || "").length > 28){
          flushBuffer();
          htmlParts.push(`
            <tr>
              <td class="kv-key">${escapeHtml(item.项目)}</td>
              <td colspan="3">${escapeHtml(item.内容)}</td>
            </tr>
          `);
        }else{
          buffer.push(item);
          if(buffer.length === 2) flushBuffer();
        }
      });

      flushBuffer();

      return `
        <div class="table-wrap kv-compact">
          <table style="min-width:0;">
            <tbody>${htmlParts.join("")}</tbody>
          </table>
        </div>
      `;
    }

      `;
    }

          <p>一是资金回流800万元。经追溯，该企业将800万元流动资金贷款通过上游供应商及贸易公司流转后，最终回流至实际控制人张某某个人账户。该笔资金流向与企业申报的贷款用途不符，已构成实质性的贷款挪用。需继续追查资金完整流向，搞清每跳资金的实际用途。</p>
          <p>二是外部顾问陈某某存在关联风险。陈某某与行内已核销黑名单客户形成间接关联，同时为另一家行内授信客户提供个人担保。若被担保企业出现逾期，陈某某的资产和信用将受到冲击，存在担保圈链风险传导的可能。</p>
          <p>本笔已采取及建议采取的行动：① 对800万资金流向进行完整追溯，编制资金链图谱；② 将陈某某关联关系信息上报合规部门评估；③ 暂停该客户新增授信审批，待资金流向核查完毕后再行评估。</p>
        `
      },
      {
        id: "investigation",
        title: "十三、调查审查报告",
        hasData: true,
        supportsProvenance: true,
        contentHtml: `${tableHTML(investigationRows)}`
      },
      {
        id: "management",
        title: "十四、批复后续管理要求落实情况",
        hasData: true,
        supportsProvenance: true,
        contentHtml: `
          <p>4项批复后续管理要求中，3项已落实：监管账户已开立、财务资料已按时报送、抵押他项权证已续办完成。</p>
          <p>资金归集率要求未落实：2025年3月归集率62%，4月归集率55%，连续两个月低于80%的批复底线。</p>
          <p>归集率持续不达标并非单纯的数字问题。资金归集率偏低的背后，可能是企业在用他行账户承接主要资金流出，已开立的监管账户未能发挥实质性管控作用。上一贷后周期已就该事项提出整改要求，本期同类问题再次发生且未得到改善，应视为风险处置不力。</p>
          <p>建议本周约谈企业实控人和财务负责人，要求提交切实可行的归集整改方案并设定明确达标时限。如后续仍无实质改善，按合同约定启动压缩授信或提前收回贷款的程序。</p>
        `
      },
      {
        id: "warning",
        title: "十五、历史预警及贷后检查意见",
        hasData: true,
        supportsProvenance: true,
        contentHtml: `
          <p>2025年3月，该企业首次触发预警，归集率62%，黄色预警，处置意见为“要求整改”。4月归集率降至55%，同类预警再次发生，等级升级为橙色。</p>
          <p>整改要求发出后未取得实效，预警信号持续存在，说明企业未就资金归集问题采取实质性行动，或其资金状况本身已不允许改善归集水平。无论哪种情况，均表明风险在累积而非消减。</p>
          <p>建议将此事项提级至贷后管理委员会，重点汇报以下内容：①资金归集率连续不达标的根本原因；②800万资金回流的核查进展；③上下游涉诉对回款的影响程度；④抵押物价值下降后我行担保覆盖率的最新测算结果。请委员会统一决定是否启动提前到期或压降程序。</p>
        `
      }
    ];

    const state = { currentModuleId:null, currentEditable:null };

    const reportCompanyTitle = document.querySelector("#report-company-title");
    const reportSections = document.querySelector("#report-sections");
    const chapterNav = document.querySelector("#chapter-nav");
    const toggleDynamicOnly = document.querySelector("#toggle-dynamic-only");
    const sidePanel = document.querySelector("#side-panel");
    const sidePanelTitle = document.querySelector("#side-panel-title");
    const sidePanelContent = document.querySelector("#side-panel-content");
    const sidePanelLauncher = document.querySelector("#side-panel-launcher");
    const panelBackdrop = document.querySelector("#panel-backdrop");
    const contextMenu = document.querySelector("#context-menu");

    reportCompanyTitle.textContent = REPORT.companyName;

    function visibleSections(){
      return toggleDynamicOnly.checked ? sections.filter(item => item.hasData) : sections;
    }

    function renderNav(){
      chapterNav.innerHTML = visibleSections().map(item => `
        <a href="#${item.id}" class="nav-item" data-nav-id="${item.id}">
          <strong>${escapeHtml(item.title)}${item.hasData ? " ☑️" : ""}</strong>
          <span>${item.supportsProvenance ? "含溯源信息" : "正文模块"}</span>
        </a>
      `).join("");
    }

    function sectionButtons(item){
      const buttons = [];
      if(item.id === "riskInsight"){
        buttons.push(`<button class="ghost-btn quick-action" data-action="knowledge" data-module-id="${item.id}" type="button">知识单元</button>`);
      }
      if(["finance","national","tax","judicial"].includes(item.id)){
        buttons.push(`<button class="ghost-btn quick-action" data-action="deep-analysis" data-module-id="${item.id}" type="button">深度分析</button>`);
      }
      if(item.id === "management"){
        buttons.push(`<button class="ghost-btn quick-action" data-action="management" data-module-id="${item.id}" type="button">回溯管理要求</button>`);
      }
      if(item.supportsProvenance){
        buttons.push(`<button class="ghost-btn quick-action" data-action="provenance" data-module-id="${item.id}" type="button">查看溯源信息</button>`);
      }
      return buttons.join("");
    }

    function renderSections(){
      reportSections.innerHTML = visibleSections().map(item => `
        <article id="${item.id}" class="section-card" data-module-id="${item.id}">
          <h3>${escapeHtml(item.title)}</h3>
          <div class="section-body">${item.contentHtml}</div>
          <div class="section-actions">${sectionButtons(item)}</div>
        </article>
      `).join("");
    }

    function syncSidePanelState(){
      const isCollapsed = sidePanel.classList.contains("collapsed");
      const isExpanded = sidePanel.classList.contains("expanded");
      sidePanelLauncher.classList.toggle("hidden", !isCollapsed);
      panelBackdrop.classList.toggle("hidden", !(isExpanded && !isCollapsed));
    }

    function openPanel(title, html, fullscreen=false){
      sidePanel.classList.remove("collapsed");
      sidePanel.classList.toggle("expanded", fullscreen);
      sidePanelTitle.textContent = title;
      sidePanelContent.innerHTML = html;
      syncSidePanelState();
    }

    function collapsePanel(){
      sidePanel.classList.remove("expanded");
      sidePanel.classList.add("collapsed");
      syncSidePanelState();
    }

    function togglePanelSize(){
      if(sidePanel.classList.contains("collapsed")) sidePanel.classList.remove("collapsed");
      sidePanel.classList.toggle("expanded");
      syncSidePanelState();
    }

    function provenanceHTML(moduleId){
      const list = provenanceMap[moduleId] || [];
      if(!list.length) return '<p class="empty-state">当前模块暂无溯源数据。</p>';
      return list.map(sourceBlockHTML).join("");
    }

    function showProvenance(moduleId){
      const section = sections.find(item => item.id === moduleId);
      openPanel(`${section ? section.title : "模块"} / 溯源信息`, provenanceHTML(moduleId), true);
    }

    function showDeepAnalysis(moduleId){
      if(moduleId === "finance") openPanel("六、财务信息 / 深度分析", financeDeepAnalysisHTML(), true);
      if(moduleId === "national") openPanel("七、国发信息 / 深度分析", nationalDeepAnalysisHTML(), true);
      if(moduleId === "tax") openPanel("八、税务信息 / 深度分析", taxDeepAnalysisHTML(), true);
      if(moduleId === "judicial") openPanel("十、司法信息 / 深度分析", judicialDeepAnalysisHTML(), true);
    }

    function showManagementPanel(){
      openPanel("回溯管理要求", `
        ${accordionHTML("14.1批复管理要求清单", tableHTML(managementListRows), true)}
        ${accordionHTML("14.2资金监管账户月度归集情况", tableHTML(managementCollectionRows), true)}
      `, true);
    }

    function showCustomerBackgroundPanel(){
      openPanel("客户背景", customerBackgroundHTML(), true);
    }

    function showKnowledgeUnitPanel(){
      openPanel("知识单元", knowledgeUnitHTML(), true);
    }

    function showAllDeepAnalysis(){
      openPanel("深度分析", `
        ${accordionHTML("六、财务信息", financeDeepAnalysisHTML(), true)}
        ${accordionHTML("七、国发信息", nationalDeepAnalysisHTML(), true)}
        ${accordionHTML("八、税务信息", taxDeepAnalysisHTML(), true)}
        ${accordionHTML("十、司法信息", judicialDeepAnalysisHTML(), true)}
      `, true);
    }

    function findEditableBlock(target){
      if(!target || !(target instanceof Element)) return null;
      return target.closest(".section-body p, .section-body li, .section-body td, .section-body th, .section-body h4, .section-body span");
    }

    function enableEditableBlock(target){
      if(!target) return;
      target.setAttribute("contenteditable", "true");
      target.classList.add("editable-block");
      target.focus();
      const range = document.createRange();
      range.selectNodeContents(target);
      range.collapse(false);
      const selection = window.getSelection();
      selection.removeAllRanges();
      selection.addRange(range);
      const finish = () => {
        target.removeAttribute("contenteditable");
        target.classList.remove("editable-block");
        target.removeEventListener("blur", finish);
      };
      target.addEventListener("blur", finish);
    }

    function insertManualNote(moduleId){
      const body = document.querySelector(`#${CSS.escape(moduleId)} .section-body`);
      if(!body) return;
      body.insertAdjacentHTML("beforeend", `
        <div class="manual-card">
          <strong>人工填写</strong>
          <textarea placeholder="进一步调查，并核查原因"></textarea>
        </div>
      `);
    }

    function downloadWord(filename, title, bodyHtml){
      const content = `
        <html>
        <head>
          <meta charset="utf-8">
          <style>
            body { font-family: "Microsoft YaHei", sans-serif; color:#10233f; line-height:1.7; }
            h1 { font-size:22pt; }
            h2,h3 { margin-top:18pt; }
            table { width:100%; border-collapse:collapse; table-layout:fixed; margin:10pt 0; }
            th,td { border:1px solid #cbd5e1; padding:7pt; vertical-align:top; word-break:break-word; font-size:10.5pt; }
            th { background:#eff6ff; }
            button, textarea, input { display:none !important; }
          </style>
        </head>
        <body>
          <h1>${escapeHtml(title)}</h1>
          ${bodyHtml}
        </body>
        </html>
      `;
      const blob = new Blob([content], {type:"application/msword;charset=utf-8"});
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = filename;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function updateActiveNav(){
      const scrollY = window.scrollY + 120;
      let activeId = "";
      document.querySelectorAll(".section-card").forEach(section => {
        if(section.offsetTop <= scrollY) activeId = section.id;
      });
      document.querySelectorAll(".nav-item").forEach(item => {
        item.classList.toggle("active", item.dataset.navId === activeId);
      });
    }

    renderNav();
    renderSections();
    syncSidePanelState();
    updateActiveNav();

    toggleDynamicOnly.addEventListener("change", () => {
      renderNav();
      renderSections();
      updateActiveNav();
    });

    reportSections.addEventListener("click", event => {
      const button = event.target.closest(".quick-action");
      if(!button) return;
      const action = button.dataset.action;
      const moduleId = button.dataset.moduleId;
      if(action === "provenance") showProvenance(moduleId);
      if(action === "deep-analysis") showDeepAnalysis(moduleId);
      if(action === "management") showManagementPanel();
      if(action === "knowledge") showKnowledgeUnitPanel();
    });

    reportSections.addEventListener("contextmenu", event => {
      const section = event.target.closest(".section-card");
      if(!section) return;
      state.currentModuleId = section.dataset.moduleId;
      state.currentEditable = findEditableBlock(event.target);
      event.preventDefault();
      contextMenu.classList.remove("hidden");
      contextMenu.style.left = `${event.clientX}px`;
      contextMenu.style.top = `${event.clientY}px`;
    });

    contextMenu.addEventListener("click", event => {
      const button = event.target.closest("button");
      if(!button || !state.currentModuleId) return;
      const action = button.dataset.action;
      if(action === "provenance") showProvenance(state.currentModuleId);
      if(action === "insert-manual-note") insertManualNote(state.currentModuleId);
      if(action === "edit-current-block") enableEditableBlock(state.currentEditable);
      contextMenu.classList.add("hidden");
    });

    document.addEventListener("click", event => {
      if(!event.target.closest("#context-menu")) contextMenu.classList.add("hidden");
    });

    document.querySelector("#toggle-panel-collapse").addEventListener("click", collapsePanel);
    document.querySelector("#toggle-panel-size").addEventListener("click", togglePanelSize);

    sidePanelLauncher.addEventListener("click", () => {
      sidePanel.classList.remove("collapsed");
      syncSidePanelState();
    });

    panelBackdrop.addEventListener("click", () => {
      sidePanel.classList.remove("expanded");
      syncSidePanelState();
    });

    document.querySelector("#back-to-top").addEventListener("click", () => {
      window.scrollTo({top:0, behavior:"smooth"});
    });

    document.querySelector("#download-word").addEventListener("click", showAllDeepAnalysis);
    document.querySelector("#show-management-panel").addEventListener("click", showManagementPanel);
    document.querySelector("#show-customer-background-panel").addEventListener("click", showCustomerBackgroundPanel);

    document.querySelector("#download-report-word").addEventListener("click", () => {
      const bodyHtml = Array.from(document.querySelectorAll(".section-card"))
        .map(section => section.innerHTML)
        .join("<hr />");
      downloadWord(`${REPORT.companyName}-贷后管理报告.doc`, `${REPORT.companyName} 贷后管理报告`, bodyHtml);
    });

    window.addEventListener("scroll", updateActiveNav, {passive:true});
  </script>
</body>
</html>
